[package]
name = "ptsync"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.1", features = ["derive", "wrap_help"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
anyhow = { version = "1.0.102" }
csv = { version = "1.4.0" }
tracing = { version = "0.1", features = ["log"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt"] }
sha2 = "0.11"
zip = "8.6"
chrono = "0.4"
file-format = "0.29"
yaml-rust2 = "0.11"
regex = "1.12.4"
strum_macros = "0.28"
rusqlite = { version = "0.40", features = ["bundled"] }
nom-exif = "3.6"
hex = "0.4"
unicode-normalization = "0.1"
rayon = "1.12.0"
indicatif = "0.18"
tempfile = "3.25.0"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[dev-dependencies]
md5 = "0.8.0"
